<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TenseMaster - English Grammar Practice</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <span class="icon">✨</span>
        <h1>TenseMaster</h1>
      </div>
      <nav style="display: flex; gap: 0.5rem; align-items: center;">
        <button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
        <button id="reset-btn" class="secondary-btn">Reset Score</button>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h2>Practice Your Past Tenses</h2>
        <p>Master the Past Simple, Past Perfect, and Past Perfect Continuous with dynamic daily challenges.</p>
      </section>

      <section class="game-container">
        <div class="stats-bar">
          <div class="stat">
            <span class="label">Score:</span>
            <span id="score" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Accuracy:</span>
            <span id="accuracy" class="value">0%</span>
          </div>
          <div class="stat">
            <span class="label">Tense:</span>
            <span id="current-tense-label" class="value">Mixed</span>
          </div>
        </div>

        <div class="quiz-card" id="quiz-card">
          <div class="progress-indicator">
            <div id="progress-bar" class="progress-fill"></div>
          </div>
          <div class="question-header">
            <span id="question-category" class="category">Past Simple</span>
            <span id="question-index" class="count">Question 1/10</span>
          </div>
          
          <div class="question-content">
            <p id="question-text" class="sentence">She <span class="blank">______</span> (go) to the store yesterday.</p>
          </div>

          <div class="input-area">
            <input type="text" id="answer-input" placeholder="Type your answer..." autocomplete="off">
            <button id="submit-btn" class="primary-btn">Check</button>
          </div>

          <div id="feedback" class="feedback hidden">
            <div class="feedback-icon"></div>
            <div class="feedback-text">Correct!</div>
          </div>
        </div>

        <div class="controls">
          <button id="next-btn" class="primary-btn hidden">Next Question</button>
          <div class="filter-group">
            <button class="filter-btn active" data-tense="mixed">Mixed</button>
            <button class="filter-btn" data-tense="simple">Past Simple</button>
            <button class="filter-btn" data-tense="perfect">Past Perfect</button>
            <button class="filter-btn" data-tense="continuous">Past Perfect Cont.</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 TenseMaster. Keep Practicing!</p>
    </footer>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
